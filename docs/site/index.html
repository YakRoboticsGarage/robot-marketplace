<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAK ROBOTICS — Product Ontology Explorer</title>
<link rel="icon" href="yak-icon.png">
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f6f8;--bg3:#ebedf2;
  --border:#d1d5db;--border2:#e5e7eb;
  --text:#1a1f26;--text2:#4a5568;--text3:#6b7280;
  --navy:#1b3a5c;--navy2:#2d5f8a;
  --accent:#e8792b;--accent2:#fef0e3;
  --green:#1a7d4e;--green2:#e6f5ed;
  --blue:#2563eb;--blue2:#eff6ff;
  --red:#dc2626;--red2:#fef2f2;
  --amber:#c27b1a;--amber2:#fef3c7;
  --r:6px;
}
html{font-size:15px}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg2);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* Header */
.header{background:var(--navy);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.header img{width:24px;height:24px;border-radius:3px}
.header h1{font-size:0.85rem;font-weight:600;letter-spacing:0.02em}
.header h1 span{color:rgba(255,255,255,0.5);font-weight:400}
.search-box{margin-left:auto;position:relative;width:260px}
.search-box input{width:100%;padding:6px 12px 6px 30px;border:1px solid rgba(255,255,255,0.2);border-radius:var(--r);background:rgba(255,255,255,0.1);color:#fff;font-family:inherit;font-size:0.78rem;outline:none}
.search-box input::placeholder{color:rgba(255,255,255,0.4)}
.search-box input:focus{border-color:var(--accent);background:rgba(255,255,255,0.15)}
.search-box::before{content:'\u2315';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.4);font-size:0.85rem}
.menu-toggle{display:none;background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;padding:4px 8px}

/* Stats bar */
.stats{background:var(--bg);border-bottom:1px solid var(--border2);padding:8px 20px;display:flex;gap:20px;font-size:0.7rem;color:var(--text3);overflow-x:auto}
.stat{white-space:nowrap}
.stat strong{color:var(--text);font-weight:600;margin-right:3px}

/* Layout */
.layout{display:flex;flex:1;overflow:hidden}

/* Sidebar */
.sidebar{width:240px;background:var(--bg);border-right:1px solid var(--border2);overflow-y:auto;flex-shrink:0;padding:8px 0}
.nav-group{padding:4px 0}
.nav-group-label{font-size:0.62rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding:8px 16px 4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:6px 16px;font-size:0.78rem;color:var(--text2);cursor:pointer;border-left:3px solid transparent;transition:all 0.12s}
.nav-item:hover{background:var(--bg2);color:var(--text)}
.nav-item.active{background:var(--accent2);color:var(--accent);border-left-color:var(--accent);font-weight:600}
.nav-icon{font-size:0.85rem;width:20px;text-align:center;flex-shrink:0}

/* Main content */
.main{flex:1;overflow-y:auto;padding:20px 24px}
.section-title{font-size:1.1rem;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.section-desc{font-size:0.78rem;color:var(--text3);margin-bottom:16px}

/* Cards */
.card{background:var(--bg);border:1px solid var(--border2);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.card-header{padding:10px 14px;font-size:0.78rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none}
.card-header:hover{background:var(--bg2)}
.card-header .chevron{margin-left:auto;font-size:0.7rem;color:var(--text3);transition:transform 0.15s}
.card.open .chevron{transform:rotate(90deg)}
.card-body{display:none;padding:10px 14px;border-top:1px solid var(--border2);font-size:0.78rem}
.card.open .card-body{display:block}

/* Key-value rows */
.kv{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--bg2)}
.kv:last-child{border-bottom:none}
.kv-key{color:var(--text3);font-weight:500;min-width:120px;flex-shrink:0;font-size:0.72rem}
.kv-val{color:var(--text);word-break:break-word}
.kv-val.mono{font-family:'JetBrains Mono',monospace;font-size:0.72rem}

/* Badges */
.badge{display:inline-block;font-size:0.62rem;font-weight:600;padding:1px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:0.04em}
.badge-green{background:var(--green2);color:var(--green)}
.badge-blue{background:var(--blue2);color:var(--blue)}
.badge-red{background:var(--red2);color:var(--red)}
.badge-amber{background:var(--amber2);color:var(--amber)}
.badge-gray{background:var(--bg3);color:var(--text3)}

/* Gravity effect */
.gravity{background:var(--accent2);border-left:3px solid var(--accent);padding:8px 12px;margin:6px 0;font-size:0.75rem;color:var(--accent);border-radius:0 var(--r) var(--r) 0;font-style:italic}

/* Confidence bar */
.conf-bar{display:flex;align-items:center;gap:8px}
.conf-track{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;max-width:120px}
.conf-fill{height:100%;background:var(--green);border-radius:3px}
.conf-val{font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:500}

/* Cross-ref */
.xref{color:var(--navy2);font-weight:500;cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px}
.xref:hover{color:var(--accent)}

/* List items */
.list-item{padding:8px 12px;border-bottom:1px solid var(--bg2);font-size:0.78rem}
.list-item:last-child{border-bottom:none}
.list-num{display:inline-block;width:22px;color:var(--text3);font-size:0.68rem;font-weight:600}

/* Search highlight */
mark{background:var(--accent2);color:var(--accent);padding:0 2px;border-radius:2px}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty .icon{font-size:2rem;margin-bottom:8px}

/* Mobile */
@media(max-width:768px){
  .sidebar{position:fixed;left:-260px;top:0;bottom:0;z-index:99;transition:left 0.2s;padding-top:52px}
  .sidebar.open{left:0;box-shadow:4px 0 20px rgba(0,0,0,0.15)}
  .menu-toggle{display:block}
  .search-box{width:160px}
  .main{padding:14px}
  .stats{padding:6px 14px;gap:12px}
}
</style>
</head>
<body>

<div class="header">
  <button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">&#9776;</button>
  <img src="yak-icon.png" alt="Yak">
  <h1>YAK ROBOTICS <span>Product Ontology v2.0</span></h1>
  <div class="search-box">
    <input type="text" id="search" placeholder="Search everything..." oninput="doSearch(this.value)">
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main">
    <div class="empty"><div class="icon">&#128203;</div>Loading product ontology...</div>
  </main>
</div>

<script>
var DATA=null;
var CURRENT_KEY=null;

var NAV_GROUPS=[
  {label:'Overview',icon:'&#128200;',keys:['meta','executive_summary','vision','mantra','essence']},
  {label:'Strategy',icon:'&#127919;',keys:['bet_chain','validation_register','unknowns']},
  {label:'Users',icon:'&#128101;',keys:['personas','journeys','demo_screen_map']},
  {label:'Market',icon:'&#127758;',keys:['market','supply_side','gtm']},
  {label:'Legal',icon:'&#9878;',keys:['legal','constitutional']},
  {label:'Technical',icon:'&#9881;',keys:['architecture','features','transfer_map','roadmap']},
  {label:'Reference',icon:'&#128218;',keys:['types','relationships','glossary','feedback_synthesis']},
  {label:'Meta',icon:'&#128300;',keys:['talisman_metadata','usage']}
];

var KEY_ICONS={meta:'&#128196;',executive_summary:'&#128161;',vision:'&#127775;',mantra:'&#128172;',essence:'&#128142;',
bet_chain:'&#127922;',validation_register:'&#128300;',unknowns:'&#10067;',
personas:'&#128100;',journeys:'&#128736;',demo_screen_map:'&#128187;',
market:'&#128200;',supply_side:'&#128230;',gtm:'&#128640;',
legal:'&#9878;',constitutional:'&#128737;',
architecture:'&#9881;',features:'&#10004;',transfer_map:'&#127761;',roadmap:'&#128197;',
types:'&#128288;',relationships:'&#128279;',glossary:'&#128214;',feedback_synthesis:'&#128172;',
talisman_metadata:'&#128142;',usage:'&#128214;'};

// Fetch and parse
fetch('product.yaml').then(r=>r.text()).then(function(txt){
  DATA=jsyaml.load(txt);
  renderSidebar();
  renderStats(txt);
  showSection('executive_summary');
}).catch(function(e){
  document.getElementById('main').innerHTML='<div class="empty"><div class="icon">&#9888;</div>Failed to load: '+e.message+'</div>';
});

function renderStats(txt){
  var lines=txt.split('\n').length;
  var keys=Object.keys(DATA).length;
  var bets=DATA.bet_chain&&DATA.bet_chain.bets?DATA.bet_chain.bets.length:0;
  var unknowns=DATA.unknowns&&DATA.unknowns.register?DATA.unknowns.register.length:0;
  var personas=Array.isArray(DATA.personas)?DATA.personas.length:0;
  var features=Array.isArray(DATA.features)?DATA.features.length:0;
  var journeys=Array.isArray(DATA.journeys)?DATA.journeys.length:0;
  document.getElementById('stats').innerHTML=
    '<div class="stat"><strong>'+lines.toLocaleString()+'</strong>lines</div>'+
    '<div class="stat"><strong>'+keys+'</strong>root keys</div>'+
    '<div class="stat"><strong>'+bets+'</strong>bets</div>'+
    '<div class="stat"><strong>'+unknowns+'</strong>unknowns</div>'+
    '<div class="stat"><strong>'+personas+'</strong>personas</div>'+
    '<div class="stat"><strong>'+journeys+'</strong>journeys</div>'+
    '<div class="stat"><strong>'+features+'</strong>features</div>';
}

function renderSidebar(){
  var html='';
  NAV_GROUPS.forEach(function(g){
    html+='<div class="nav-group"><div class="nav-group-label">'+g.label+'</div>';
    g.keys.forEach(function(k){
      if(DATA[k]!==undefined){
        var icon=KEY_ICONS[k]||'&#128196;';
        html+='<div class="nav-item" data-key="'+k+'" onclick="showSection(\''+k+'\')"><span class="nav-icon">'+icon+'</span>'+formatKeyName(k)+'</div>';
      }
    });
    html+='</div>';
  });
  document.getElementById('sidebar').innerHTML=html;
}

function formatKeyName(k){
  return k.replace(/_/g,' ').replace(/\b\w/g,function(l){return l.toUpperCase()});
}

function showSection(key){
  CURRENT_KEY=key;
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.toggle('active',n.dataset.key===key)});
  document.querySelector('.sidebar').classList.remove('open');
  var val=DATA[key];
  var icon=KEY_ICONS[key]||'&#128196;';
  var html='<div class="section-title">'+icon+' '+formatKeyName(key)+'</div>';
  html+='<div class="section-desc">'+getDesc(key)+'</div>';
  html+=renderValue(val,0);
  document.getElementById('main').innerHTML=html;
  document.getElementById('main').scrollTop=0;
  // Open first card
  var first=document.querySelector('.main .card');
  if(first)first.classList.add('open');
}

function getDesc(key){
  var descs={
    meta:'Project identity and schema metadata',
    executive_summary:'The compressed core — read this in 30 seconds',
    vision:'North star, thesis, and positioning',
    mantra:'One-line anchor statement',
    essence:'What this document is',
    bet_chain:'Dependent strategic bets with confidence and falsification conditions',
    validation_register:'Experiments designed to test the foundational bets',
    unknowns:'Things we don\'t know, with severity and resolution deadlines',
    personas:'Every user type including AI agents',
    journeys:'Pipeline-stage model with actor handoffs',
    demo_screen_map:'Every screen in the live demo mapped to entities',
    market:'Competitive landscape, TAM, wedge logic, geographies, partnerships',
    supply_side:'Operator economics, equipment catalog, onboarding',
    gtm:'Go-to-market: first customers, channels, messaging',
    legal:'Contracts, bonds, insurance, compliance — moats vs overhead',
    constitutional:'System invariants, policies, and agent governance rules',
    architecture:'Product capabilities, MCP tools, settlement, execution stack',
    features:'12 features for v1.5 with IDs and status',
    transfer_map:'Earth → Lunar capability transfer matrix',
    roadmap:'Phases and condition-gated milestones',
    types:'Closed enums and type definitions for schema consistency',
    relationships:'Typed edges between entities across domains',
    glossary:'Domain terms defined for LLM and human clarity',
    feedback_synthesis:'Key findings from 21 feedback documents',
    talisman_metadata:'Self-description per thejaymo.net Knowledge Object patterns',
    usage:'How to use this document'
  };
  return descs[key]||'';
}

function renderValue(val,depth){
  if(val===null||val===undefined) return '<span class="text3">null</span>';
  if(typeof val==='string') return renderString(val);
  if(typeof val==='number') return renderNumber(val);
  if(typeof val==='boolean') return '<span class="badge '+(val?'badge-green':'badge-gray')+'">'+(val?'true':'false')+'</span>';
  if(Array.isArray(val)) return renderArray(val,depth);
  if(typeof val==='object') return renderObject(val,depth);
  return String(val);
}

function renderString(s){
  // Check for cross-references
  if(s.match(/^(persona|bet|equipment|phase|feature|journey|unknown|component|cap|pol|inv):/)){
    return '<span class="xref" onclick="jumpToRef(\''+s+'\')">'+esc(s)+'</span>';
  }
  // Check for status values
  if(s==='implemented') return '<span class="badge badge-green">IMPLEMENTED</span>';
  if(s==='planned') return '<span class="badge badge-blue">PLANNED</span>';
  if(s==='gap'||s==='blocked') return '<span class="badge badge-red">'+s.toUpperCase()+'</span>';
  if(s==='high'||s==='critical') return '<span class="badge badge-red">'+s.toUpperCase()+'</span>';
  if(s==='medium') return '<span class="badge badge-amber">MEDIUM</span>';
  if(s==='low') return '<span class="badge badge-green">LOW</span>';
  return '<span>'+esc(s)+'</span>';
}

function renderNumber(n){
  // Confidence values
  if(n>=0&&n<=1&&n!==0&&n!==1){
    var pct=Math.round(n*100);
    return '<div class="conf-bar"><div class="conf-track"><div class="conf-fill" style="width:'+pct+'%"></div></div><span class="conf-val">'+pct+'%</span></div>';
  }
  return '<span class="mono">'+n+'</span>';
}

function renderArray(arr,depth){
  if(arr.length===0) return '<span class="text3">[]</span>';
  // Simple string array
  if(arr.every(function(x){return typeof x==='string'})){
    return '<div>'+arr.map(function(s,i){return '<div class="list-item"><span class="list-num">'+(i+1)+'.</span> '+renderString(s)+'</div>'}).join('')+'</div>';
  }
  // Object array — each as a card
  return arr.map(function(item,i){
    var label=item.id||item.name||item.title||item.claim||item.rule||('Item '+(i+1));
    if(typeof label==='string'&&label.length>80) label=label.substring(0,77)+'...';
    var id=item.id||'';
    var statusBadge='';
    if(item.status) statusBadge=' '+renderString(item.status);
    if(item.severity) statusBadge=' '+renderString(item.severity);
    return '<div class="card"><div class="card-header" onclick="this.parentElement.classList.toggle(\'open\')">'+
      (id?'<span class="badge badge-gray">'+esc(id)+'</span> ':'')+
      '<span>'+esc(typeof label==='string'?label:String(label))+'</span>'+statusBadge+
      '<span class="chevron">&#9654;</span></div>'+
      '<div class="card-body">'+renderObject(item,depth+1)+'</div></div>';
  }).join('');
}

function renderObject(obj,depth){
  var keys=Object.keys(obj);
  if(keys.length===0) return '<span class="text3">{}</span>';
  var html='';
  keys.forEach(function(k){
    var v=obj[k];
    // Special rendering for gravity_effect
    if(k==='gravity_effect'&&typeof v==='string'){
      html+='<div class="gravity">&#9888; '+esc(v)+'</div>';
      return;
    }
    // Special rendering for confidence
    if(k==='confidence'&&typeof v==='number'){
      html+='<div class="kv"><div class="kv-key">'+esc(k)+'</div><div class="kv-val">'+renderNumber(v)+'</div></div>';
      return;
    }
    // Nested objects/arrays — sub-card
    if(typeof v==='object'&&v!==null&&!Array.isArray(v)&&Object.keys(v).length>3&&depth<3){
      html+='<div class="card"><div class="card-header" onclick="this.parentElement.classList.toggle(\'open\')">'+
        '<span>'+formatKeyName(k)+'</span><span class="badge badge-gray">'+Object.keys(v).length+' keys</span>'+
        '<span class="chevron">&#9654;</span></div>'+
        '<div class="card-body">'+renderObject(v,depth+1)+'</div></div>';
      return;
    }
    if(Array.isArray(v)&&v.length>0&&typeof v[0]==='object'){
      html+='<div class="card"><div class="card-header" onclick="this.parentElement.classList.toggle(\'open\')">'+
        '<span>'+formatKeyName(k)+'</span><span class="badge badge-gray">'+v.length+' items</span>'+
        '<span class="chevron">&#9654;</span></div>'+
        '<div class="card-body">'+renderArray(v,depth+1)+'</div></div>';
      return;
    }
    // Simple key-value
    html+='<div class="kv"><div class="kv-key">'+esc(k)+'</div><div class="kv-val">'+renderValue(v,depth+1)+'</div></div>';
  });
  return html;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function jumpToRef(ref){
  var parts=ref.split(':');
  if(parts.length<2) return;
  var domain=parts[0];
  // Map domain to root key
  var keyMap={persona:'personas',bet:'bet_chain',equipment:'supply_side',phase:'roadmap',
    feature:'features',journey:'journeys',unknown:'unknowns',component:'architecture',
    cap:'architecture',pol:'constitutional',inv:'constitutional'};
  var rootKey=keyMap[domain];
  if(rootKey&&DATA[rootKey]) showSection(rootKey);
}

function doSearch(q){
  if(!q||q.length<2){if(CURRENT_KEY)showSection(CURRENT_KEY);return}
  q=q.toLowerCase();
  var results=[];
  function searchObj(obj,path){
    if(!obj) return;
    if(typeof obj==='string'&&obj.toLowerCase().indexOf(q)!==-1){
      results.push({path:path,val:obj});
    } else if(typeof obj==='object'){
      var keys=Array.isArray(obj)?obj.map(function(_,i){return i}):Object.keys(obj);
      keys.forEach(function(k){
        var kStr=String(k);
        if(kStr.toLowerCase().indexOf(q)!==-1) results.push({path:path+'.'+kStr,val:String(obj[k]).substring(0,200)});
        searchObj(obj[k],path+'.'+kStr);
      });
    }
  }
  Object.keys(DATA).forEach(function(k){searchObj(DATA[k],k)});
  var html='<div class="section-title">&#128269; Search: "'+esc(q)+'"</div>';
  html+='<div class="section-desc">'+results.length+' matches found</div>';
  results.slice(0,50).forEach(function(r){
    var highlighted=esc(r.val).replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
    html+='<div class="card"><div class="card-header" onclick="showSection(\''+r.path.split('.')[0]+'\')">'+
      '<span class="badge badge-gray">'+esc(r.path.split('.')[0])+'</span>'+
      '<span style="font-size:0.7rem;color:var(--text3)">'+esc(r.path)+'</span>'+
      '<span class="chevron">&#9654;</span></div>'+
      '<div class="card-body" style="display:block">'+highlighted+'</div></div>';
  });
  if(results.length>50) html+='<div style="text-align:center;padding:12px;color:var(--text3);font-size:0.75rem">Showing first 50 of '+results.length+' results</div>';
  if(results.length===0) html+='<div class="empty"><div class="icon">&#128269;</div>No matches for "'+esc(q)+'"</div>';
  document.getElementById('main').innerHTML=html;
}
</script>
</body>
</html>
